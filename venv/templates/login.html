{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="card bg-base-200 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-3xl justify-center mb-6">ログイン</h2>
            <form method="POST">
                <div class="form-control">
                    <label class="label"><span class="label-text">メールアドレス</span></label>
                    <input type="email" name="email" class="input input-bordered" required>
                </div>
                <div class="form-control mt-4">
                    <label class="label"><span class="label-text">パスワード</span></label>
                    <input type="password" name="password" class="input input-bordered" required>
                </div>
                <button type="submit" class="btn btn-primary w-full mt-8">ログイン</button>
            </form>
            <p class="text-center mt-6">
                アカウントをお持ちでない方は <a href="{{ url_for('register') }}" class="link link-primary">登録</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
